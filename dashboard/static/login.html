<!DOCTYPE html>
<html lang="ro" data-theme="dark">
<script>
(function(){
  var t=localStorage.getItem('pi-theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.documentElement.style.visibility='hidden';
  window.addEventListener('DOMContentLoaded',function(){
    document.documentElement.style.visibility='';
  });
})();
</script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pi Guardian — Login</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{--bg:#07090f;--bg2:#0d1018;--bg3:#131720;--border:rgba(255,255,255,.07);--border-h:rgba(255,255,255,.14);--text:#eceef5;--muted:#6b7591;--accent:#4fc3f7;--accent2:#8b7cf8;--red:#f87171}
[data-theme="light"]{--bg:#f1f4f9;--bg2:#fff;--bg3:#f7f9fc;--border:rgba(0,0,0,.08);--border-h:rgba(0,0,0,.16);--text:#141824;--muted:#8892aa;--accent:#0ea5e9;--accent2:#7c3aed;--red:#dc2626}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;transition:background .3s,color .3s}
[data-theme="dark"] body::before{content:'';position:fixed;top:-40vh;left:-20vw;width:80vw;height:80vh;background:radial-gradient(ellipse,rgba(79,195,247,.04) 0%,transparent 70%);pointer-events:none}
[data-theme="dark"] body::after{content:'';position:fixed;bottom:-30vh;right:-10vw;width:60vw;height:60vh;background:radial-gradient(ellipse,rgba(139,124,248,.05) 0%,transparent 70%);pointer-events:none}
.theme-btn{position:fixed;top:20px;right:20px;width:38px;height:38px;border-radius:9px;border:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;z-index:10}
.theme-btn:hover{border-color:var(--border-h);transform:scale(1.05)}
.wrap{width:100%;max-width:420px;padding:24px;position:relative;z-index:1;animation:appear .5s cubic-bezier(.4,0,.2,1) both}
@keyframes appear{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
[data-theme="light"] .card{box-shadow:0 8px 40px rgba(0,0,0,.1)}
.logo{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 24px;box-shadow:0 0 32px rgba(79,195,247,.25);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.title{text-align:center;font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.5px;margin-bottom:6px}
.sub{text-align:center;font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:32px}
.fg{margin-bottom:18px}
.fl{display:block;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.fi{width:100%;padding:13px 16px;border-radius:11px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;transition:all .2s;outline:none}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,195,247,.12)}
.fi::placeholder{color:var(--muted)}
.err{display:none;align-items:center;gap:8px;padding:12px 14px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--red);margin-bottom:18px}
.sbtn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(79,195,247,.25);letter-spacing:.3px;margin-top:8px}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,195,247,.35)}
.sbtn:active{transform:translateY(0)}
.sbtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.foot{text-align:center;margin-top:24px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div class="theme-btn" id="tbtn">🌙</div>

<div class="wrap">
  <div class="card">
    <div class="logo">🛡</div>
    <div class="title">Pi Guardian</div>
    <div class="sub">Raspberry Pi Zero 2W · Dashboard</div>

    <div class="err" id="err">
      <span>⚠️</span>
      <span id="err-msg">Incorrect username or password</span>
    </div>

    <form method="POST" action="/login" onsubmit="onSub(this)">
      <div class="fg">
        <label class="fl" for="u">Username</label>
        <input class="fi" type="text" id="u" name="username"
               placeholder="Enter your username" autocomplete="username" required autofocus>
      </div>
      <div class="fg">
        <label class="fl" for="p">Password</label>
        <input class="fi" type="password" id="p" name="password"
               placeholder="Enter your password" autocomplete="current-password" required>
      </div>
      <button class="sbtn" type="submit" id="sbtn">Enter Dashboard →</button>
    </form>

    <div class="foot">Session expires after 24 hours</div>
    <div class="foot" style="margin-top:8px">
      <a href="/register" style="color:var(--accent);text-decoration:none;font-weight:600">
        No account? Sign up →
      </a>
    </div>
  </div>
</div>

<script>
const html=document.documentElement;
const tb=document.getElementById('tbtn');
function applyTheme(t){html.setAttribute('data-theme',t);tb.textContent=t==='dark'?'🌙':'☀️';localStorage.setItem('pi-theme',t)}
tb.addEventListener('click',()=>applyTheme(html.getAttribute('data-theme')==='dark'?'light':'dark'));
applyTheme(localStorage.getItem('pi-theme')||'dark');
if(new URLSearchParams(location.search).get('verified')==='1'){
  const err=document.querySelector('.err');
  if(err){err.style.background='rgba(52,211,153,.12)';err.style.borderColor='rgba(52,211,153,.3)';err.style.color='var(--green)';err.textContent='✅ Account verified! You can sign in.';err.style.display='block'}
}
function onSub(){const b=document.getElementById('sbtn');b.disabled=true;b.textContent='⏳ Verifying...'}
document.getElementById('u').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('p').focus()}});
</script>
</body>
</html>
